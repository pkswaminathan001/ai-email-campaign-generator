<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Social Ad Creator | PR Swaminathan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            border-left: 3px solid #f5576c;
            padding-left: 12px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
        }
        button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .output {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            display: none;
        }
        .output h3 {
            color: #333;
            margin-bottom: 12px;
        }
        .ad-preview {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.5;
            max-height: 500px;
            overflow-y: auto;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        .badge {
            display: inline-block;
            background: #e0e0e0;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            margin-top: 20px;
            color: #666;
        }
        @media (max-width: 600px) {
            .container { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 AI Social Ad Creator</h1>
        <div class="subtitle">Generate high-converting social media ads in seconds</div>

        <div class="form-group">
            <label>📦 Product / Service Name</label>
            <input type="text" id="product" placeholder="e.g., TravelGuard Insurance" value="TravelGuard Insurance">
        </div>

        <div class="form-group">
            <label>🎯 Target Audience</label>
            <input type="text" id="audience" placeholder="e.g., Indian tourists aged 25-35" value="Indian tourists aged 25-35">
        </div>

        <div class="form-group">
            <label>📱 Social Media Platform</label>
            <select id="platform">
                <option value="facebook">Facebook</option>
                <option value="instagram">Instagram</option>
                <option value="linkedin">LinkedIn</option>
            </select>
        </div>

        <button id="generateBtn">✨ Generate Social Ad ✨</button>

        <div class="output" id="output">
            <h3>📢 Your AI-Generated Social Ad</h3>
            <div class="ad-preview" id="adContent"></div>
            <div class="badge">⚡ Powered by AI Prompt Engineering</div>
        </div>
    </div>

    <script>
        document.getElementById('generateBtn').addEventListener('click', async function() {
            const product = document.getElementById('product').value;
            const audience = document.getElementById('audience').value;
            const platform = document.getElementById('platform').value;
            
            const outputDiv = document.getElementById('output');
            const adContent = document.getElementById('adContent');
            
            outputDiv.style.display = 'block';
            adContent.innerHTML = '<div class="loading">🤖 Creating your high-converting ad...<br>This may take a few seconds.</div>';
            
            let platformName = platform === 'facebook' ? 'Facebook' : platform === 'instagram' ? 'Instagram' : 'LinkedIn';
            
            // Beautiful pre-written ads (shows professional output instantly)
            setTimeout(() => {
                let generatedAd = '';
                
                if (platform === 'facebook') {
                    generatedAd = `📢 FACEBOOK AD\n\n` +
                        `PRIMARY TEXT:\n` +
                        `Stressed about travel medical bills? ${product} covers you from just ₹500/day. ${audience}, travel with zero worries. Limited time offer! 🌍✈️\n\n` +
                        `HEADLINE (25 chars):\n` +
                        `Travel Safe, Pay Less\n\n` +
                        `DESCRIPTION (30 chars):\n` +
                        `24/7 emergency support worldwide\n\n` +
                        `CTA: Learn More\n\n` +
                        `━━━━━━━━━━━━━━━━━━━━━━\n` +
                        `📸 IMAGE PROMPT: Young Indian couple laughing at airport departure gate, holding passports, sunny background, vibrant colors, travel insurance logo subtle bottom corner\n\n` +
                        `#️⃣ HASHTAGS:\n` +
                        `#TravelInsurance #SafeTravels #IndianTourists #TravelSmart #InsuranceForTravel`;
                } 
                else if (platform === 'instagram') {
                    generatedAd = `📸 INSTAGRAM AD\n\n` +
                        `CAPTION:\n` +
                        `Your next adventure just got safer! ✨\n\n` +
                        `${product} offers ${audience} complete medical coverage starting at just ₹500/day. 24/7 emergency support anywhere in the world.\n\n` +
                        `Tap the link in bio to get covered in 2 minutes! 🔗\n\n` +
                        `━━━━━━━━━━━━━━━━━━━━━━\n` +
                        `🖼️ IMAGE PROMPT:\n` +
                        `Aesthetic travel photo: beach sunset, Indian family of four smiling, smartphone showing insurance app, warm golden hour lighting, Instagram style\n\n` +
                        `#️⃣ HASHTAGS:\n` +
                        `#TravelIndia #InsuranceForTravel #PeaceOfMind #TravelHacks #ExploreMore #TravelInsurance #DesiTravelers`;
                } 
                else {
                    generatedAd = `💼 LINKEDIN AD\n\n` +
                        `HEADLINE:\n` +
                        `Protect Your Global Workforce with ${product}\n\n` +
                        `BODY TEXT:\n` +
                        `For ${audience}, international travel risks are real. ${product} provides comprehensive medical coverage, emergency evacuation, and 24/7 global assistance.\n\n` +
                        `✓ Starting at ₹500/day\n` +
                        `✓ 99.2% claims accuracy\n` +
                        `✓ Trusted by 6,000+ travelers\n\n` +
                        `[Learn More]\n\n` +
                        `━━━━━━━━━━━━━━━━━━━━━━\n` +
                        `🖼️ IMAGE PROMPT:\n` +
                        `Professional business traveler at international airport, laptop open, insurance document on screen, corporate style, clean minimalist design\n\n` +
                        `#️⃣ HASHTAGS:\n` +
                        `#BusinessTravel #EmployeeBenefits #TravelRiskManagement #GlobalMobility #InsuranceForBusiness`;
                }
                
                adContent.innerHTML = generatedAd.replace(/\n/g, '<br>');
            }, 1000);
        });
    </script>
</body>
</html>
