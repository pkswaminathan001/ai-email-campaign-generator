    <script>
        // Poe.com API configuration
        const API_KEY = 'YOUR_POE_API_KEY_HERE';  // Replace with your actual API key
        const BOT_NAME = 'Assistant';  // Free bot on Poe.com
        
        document.getElementById('generateBtn').addEventListener('click', async function() {
            const product = document.getElementById('product').value;
            const audience = document.getElementById('audience').value;
            const emailType = document.getElementById('emailType').value;
            
            const outputDiv = document.getElementById('output');
            const emailContent = document.getElementById('emailContent');
            
            // Show loading state
            outputDiv.style.display = 'block';
            emailContent.innerHTML = '<div class="loading">🤖 Contacting AI... Generating your email campaign...<br>This may take 10-15 seconds.</div>';
            
            // Build the prompt based on email type
            let prompt = '';
            if (emailType === 'welcome') {
                prompt = `Write a warm welcome email for new subscribers of ${product}. Target audience: ${audience}. Include: thank you, brand promise, and a 10% discount code (WELCOME10). Tone: friendly and excited. Max 150 words.`;
            } else if (emailType === 'promotional') {
                prompt = `Write a promotional email for ${product} targeting ${audience}. Highlight one key benefit. Add a clear CTA button: "Shop Now". Urgency: "Limited stock". Max 120 words.`;
            } else {
                prompt = `Write a cart abandonment email for ${product} targeting ${audience}. Remind them what they left. Add social proof ("5 people bought this today"). Offer free shipping. Max 100 words.`;
            }
            
            try {
                // Call Poe.com API
                const response = await fetch('https://api.poe.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        bot: BOT_NAME,
                        messages: [
                            { role: 'user', content: prompt }
                        ],
                        temperature: 0.7,
                        max_tokens: 500
                    })
                });
                
                const data = await response.json();
                const generatedEmail = data.choices[0].message.content;
                emailContent.innerHTML = generatedEmail.replace(/\n/g, '<br>');
                
            } catch (error) {
                console.error('Error:', error);
                emailContent.innerHTML = '⚠️ AI service temporarily unavailable. Please try again in a few moments.<br><br>Note: This tool is configured to work with Poe.com API. Make sure your API key is valid.';
            }
        });
    </script>
