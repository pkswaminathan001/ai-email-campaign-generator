    <script>
        // Real AI using Hugging Face (100% free, no API key required)
        document.getElementById('generateBtn').addEventListener('click', async function() {
            const product = document.getElementById('product').value;
            const audience = document.getElementById('audience').value;
            const emailType = document.getElementById('emailType').value;
            
            const outputDiv = document.getElementById('output');
            const emailContent = document.getElementById('emailContent');
            
            outputDiv.style.display = 'block';
            emailContent.innerHTML = '<div class="loading">🤖 Connecting to AI... Generating your unique email...<br>This may take 10-15 seconds.</div>';
            
            let prompt = '';
            if (emailType === 'welcome') {
                prompt = `Write a warm welcome email for ${product}. Target audience: ${audience}. Include: thank you, brand promise, and a 10% discount code (WELCOME10). Tone: friendly and excited. Max 150 words.`;
            } else if (emailType === 'promotional') {
                prompt = `Write a promotional email for ${product} targeting ${audience}. Highlight one key benefit. Add a clear CTA button: "Shop Now". Urgency: "Limited stock". Max 120 words.`;
            } else {
                prompt = `Write a cart abandonment email for ${product} targeting ${audience}. Remind them what they left. Add social proof ("5 people bought this today"). Offer free shipping. Max 100 words.`;
            }
            
            try {
                // Using Hugging Face's free inference API
                const response = await fetch('https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.1', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        inputs: prompt,
                        parameters: {
                            max_new_tokens: 500,
                            temperature: 0.7,
                            return_full_text: false
                        }
                    })
                });
                
                if (!response.ok) throw new Error('API temporarily busy');
                
                const data = await response.json();
                let generatedEmail = data[0]?.generated_text || data.generated_text;
                
                if (!generatedEmail) throw new Error('No response');
                
                // Clean up the output
                generatedEmail = generatedEmail.replace(prompt, '').trim();
                emailContent.innerHTML = generatedEmail.replace(/\n/g, '<br>');
                
            } catch (error) {
                console.error('AI Error:', error);
                // Fallback demo email (shows UI works)
                let fallbackEmail = '';
                if (emailType === 'welcome') {
                    fallbackEmail = `🎉 Welcome to ${product}!\n\nDear ${audience},\n\nThank you for choosing ${product}! We promise you worry-free travel.\n\nUse code WELCOME10 for 10% off your first purchase.\n\nSafe travels,\nThe ${product} Team`;
                } else if (emailType === 'promotional') {
                    fallbackEmail = `⚡ LIMITED STOCK: ${product}\n\nHi ${audience},\n\nGet ${product} today and travel with confidence.\n\nOne key benefit: 24/7 emergency assistance.\n\n[SHOP NOW]\n\nHurry, limited stock available!`;
                } else {
                    fallbackEmail = `🛒 Don't miss out!\n\nHello,\n\nYou left ${product} in your cart. 5 people bought this today!\n\n✅ Free shipping on your order.\n\n[Complete Your Purchase]`;
                }
                emailContent.innerHTML = fallbackEmail.replace(/\n/g, '<br>') + '<br><br><hr><small>⚠️ Demo mode: Real AI temporarily unavailable (API rate limit). The UI is ready for production API integration.</small>';
            }
        });
    </script>
